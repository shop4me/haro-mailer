<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — {{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body class="login-page">
    <div class="login-card">
      <h1>{{ app_name }}</h1>
      <p class="sub muted" style="font-size:0.9rem;margin-top:-4px;">{{ app_domain }}</p>
      <p class="sub">Sign in to the dashboard</p>
      <form method="post">
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Admin password" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary">Log in</button>
      </form>
    </div>
  </body>
</html>
