# Floatfire HARO mailer — HTTPS via Let's Encrypt (certbot adds ssl_* lines) or add manually.
# After placing this file, run (as root):
#   sudo ln -sf /etc/nginx/sites-available/floatfire.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d floatfire.com -d www.floatfire.com
# If www does not exist in DNS yet, use: sudo certbot --nginx -d floatfire.com

server {
    listen 80;
    server_name floatfire.com www.floatfire.com;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
